# Track A: Non-Reasoning QLoRA Fine-Tuning
# Qwen3-1.7B in /no_think (instruct) mode

model:
  name: "Qwen/Qwen3-1.7B"
  thinking_mode: false          # /no_think — non-reasoning
  trust_remote_code: true

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./checkpoints/track_a_qwen3_no_think"
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4  # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  max_seq_length: 1024
  fp16: false
  bf16: true
  logging_steps: 50
  save_steps: 500
  save_total_limit: 2
  seed: 42
  optim: "paged_adamw_8bit"
  gradient_checkpointing: true

data:
  dataset: "spider"
  train_split: "train"
  eval_split: "validation"
  prompt_style: "baseline"      # Fine-tune on baseline; test all at inference
